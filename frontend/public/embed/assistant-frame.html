<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EASP AI Assistant</title>
  <style>
    html, body, #root { margin: 0; width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: #fff; }
    .wrap { height: 100%; display: flex; flex-direction: column; }
    .hd { height: 52px; display:flex; align-items:center; justify-content:space-between; padding:0 14px; background:#1677ff; color:#fff; font-weight:600; }
    .msgs { flex:1; overflow:auto; padding:14px; background:#f8fafc; }
    .msg { max-width:86%; margin:8px 0; padding:10px 12px; border-radius:14px; white-space:pre-wrap; line-height:1.5; font-size:14px; }
    .user { margin-left:auto; background:#1677ff; color:#fff; }
    .assistant { background:#fff; border:1px solid #e5e7eb; color:#111827; }
    .ft { display:flex; gap:8px; padding:10px; border-top:1px solid #e5e7eb; }
    textarea { flex:1; resize:none; border:1px solid #d1d5db; border-radius:10px; padding:9px; outline:none; }
    button { border:0; border-radius:10px; background:#1677ff; color:#fff; padding:0 14px; cursor:pointer; }
    .tip { color:#64748b; font-size:13px; padding:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hd"><span>EASP AI 助手</span><span id="state">等待 Token</span></div>
    <main id="msgs" class="msgs"><div class="msg assistant">请通过 postMessage 注入 EASP_ASSISTANT_TOKEN。</div></main>
    <footer class="ft"><textarea id="input" rows="2" placeholder="输入问题..."></textarea><button id="send">发送</button></footer>
  </div>
  <script>
    let token = '';
    let pageContext = { url: location.href, title: document.title };
    let conversationId = localStorage.getItem('easp_embed_frame_conversation_id') || '';
    const msgs = document.getElementById('msgs');
    const input = document.getElementById('input');
    const state = document.getElementById('state');
    function append(role, text, replaceLast) {
      let el = replaceLast ? msgs.lastElementChild : null;
      if (!el || !el.classList.contains(role)) {
        el = document.createElement('div'); el.className = 'msg ' + role; msgs.appendChild(el);
      }
      el.textContent = text; msgs.scrollTop = msgs.scrollHeight;
    }
    async function readSSE(res, onText, onConversation) {
      const reader = res.body && res.body.getReader(); if (!reader) return;
      const decoder = new TextDecoder(); let buffer = '';
      while (true) {
        const r = await reader.read(); if (r.done) break;
        buffer += decoder.decode(r.value, { stream: true });
        const events = buffer.split('\n\n'); buffer = events.pop() || '';
        for (const event of events) {
          const line = event.split('\n').find(l => l.startsWith('data:')); if (!line) continue;
          try { const data = JSON.parse(line.slice(5).trim()); if (data.conversation_id) onConversation(data.conversation_id); if (data.content) onText(data.content); if (data.delta) onText(data.delta); } catch(e) {}
        }
      }
    }
    async function send() {
      const text = input.value.trim(); if (!text) return;
      if (!token) { append('assistant', '未收到 easp-api-token，无法发送。'); return; }
      input.value = ''; append('user', text);
      let answer = ''; append('assistant', '', false);
      const res = await fetch('/embed/v1/assistant/chat', { method:'POST', headers:{ 'Content-Type':'application/json', 'easp-api-token': token }, body: JSON.stringify({ conversation_id: conversationId || undefined, messages:[{ role:'user', content:text }], page_context: pageContext }) });
      if (!res.ok) { append('assistant', '请求失败：' + await res.text(), true); return; }
      await readSSE(res, chunk => { answer += chunk; append('assistant', answer, true); }, id => { conversationId = id; localStorage.setItem('easp_embed_frame_conversation_id', id); });
    }
    window.addEventListener('message', (event) => {
      const data = event.data || {};
      if (data.type === 'EASP_ASSISTANT_TOKEN') { token = data.token || ''; pageContext = data.context || pageContext; state.textContent = token ? '已连接' : '无 Token'; }
      if (data.type === 'EASP_ASSISTANT_CONTEXT_UPDATE') pageContext = data.context || pageContext;
      if (data.type === 'EASP_ASSISTANT_LOGOUT') { token = ''; state.textContent = '已退出'; }
    });
    document.getElementById('send').onclick = send;
    input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
  </script>
</body>
</html>
