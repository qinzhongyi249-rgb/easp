<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EASP AI Assistant</title>
  <style>
    html, body, #root { margin: 0; width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: #fff; }
    .wrap { height: 100%; display: flex; flex-direction: column; }
    .hd { height: 52px; display:flex; align-items:center; justify-content:space-between; padding:0 14px; background:#1677ff; color:#fff; font-weight:600; }
    .msgs { flex:1; overflow:auto; padding:14px; background:#f8fafc; }
    .msg { max-width:86%; margin:8px 0; padding:10px 12px; border-radius:14px; white-space:pre-wrap; line-height:1.5; font-size:14px; }
    .user { margin-left:auto; background:#1677ff; color:#fff; }
    .assistant { background:#fff; border:1px solid #e5e7eb; color:#111827; }
    .step{max-width:90%;margin:8px 0;padding:8px 10px;border-radius:12px;background:#f1f5f9;border:1px solid #e2e8f0;font-size:13px}.step-title{display:flex;align-items:center;gap:6px;font-weight:500;color:#334155}.step-dot{width:8px;height:8px;border-radius:50%;background:#94a3b8}.step-dot.running{background:#f59e0b;animation:pulse 2s infinite}.step-dot.done{background:#10b981}.step-dot.error{background:#ef4444}.step-result{margin-top:6px;padding-top:6px;border-top:1px solid #e2e8f0;color:#475569;white-space:pre-wrap}@keyframes pulse{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}
    .ft { display:flex; gap:8px; padding:10px; border-top:1px solid #e5e7eb; }
    textarea { flex:1; resize:none; border:1px solid #d1d5db; border-radius:10px; padding:9px; outline:none; }
    button { border:0; border-radius:10px; background:#1677ff; color:#fff; padding:0 14px; cursor:pointer; }
    .tip { color:#64748b; font-size:13px; padding:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hd"><span>EASP AI 助手</span><span id="state">等待 Token</span></div>
    <main id="msgs" class="msgs"><div class="msg assistant">请通过 postMessage 注入 EASP_ASSISTANT_TOKEN。</div></main>
    <footer class="ft"><textarea id="input" rows="2" placeholder="输入问题..."></textarea><button id="send">发送</button></footer>
  </div>
  <script>
  let token = '';
  let assistantName = 'EASP AI 助手';
  let pageContext = { url: location.href, title: document.title };
  let conversationId = localStorage.getItem('easp_embed_frame_conversation_id') || '';
  const msgs = document.getElementById('msgs');
  const input = document.getElementById('input');
  const state = document.getElementById('state');
  function escapeHtml(text) {
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }
  function append(role, text, replaceLast) {
    let el = replaceLast ? msgs.lastElementChild : null;
    if (!el || !el.classList.contains(role)) {
      el = document.createElement('div'); el.className = 'msg ' + role; msgs.appendChild(el);
    }
    el.textContent = text; msgs.scrollTop = msgs.scrollHeight;
  }
  function appendStep(step) {
    const el = document.createElement('div');
    el.className = 'step step-' + step.status;
    el.innerHTML = '<div class="step-title"><span class="step-dot ' + step.status + '"></span><span>' + step.title + '</span></div>' + (step.result ? '<div class="step-result">' + escapeHtml(step.result) + '</div>' : '');
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
  }
  async function readSSE(res, onText, onConversation, onStep) {
    const reader = res.body && res.body.getReader(); if (!reader) return;
    const decoder = new TextDecoder(); let buffer = '';
    while (true) {
      const r = await reader.read(); if (r.done) break;
      buffer += decoder.decode(r.value, { stream: true });
      const events = buffer.split('\n\n'); buffer = events.pop() || '';
      for (const event of events) {
        const eventTypeLine = event.split('\n').find(l => l.startsWith('event:'));
        const line = event.split('\n').find(l => l.startsWith('data:')); if (!line) continue;
        try {
          const data = JSON.parse(line.slice(5).trim());
          if (data.conversation_id) onConversation(data.conversation_id);
          if (data.content) onText(data.content); if (data.delta) onText(data.delta);
          if (eventTypeLine) {
            const eventType = eventTypeLine.slice(6).trim();
            if (eventType === 'step' && onStep && data.step && data.title) {
              onStep({ step: data.step, title: data.title, status: data.status || 'running', result: data.result });
            }
          }
        } catch(e) {}
      }
    }
  }
    async function send() {
      const text = input.value.trim(); if (!text) return;
      if (!token) { append('assistant', '未收到 easp-api-token，无法发送。'); return; }
      input.value = ''; append('user', text);
      let answer = ''; append('assistant', '', false);
      console.log('[EASPAssistant iframe] sending chat request, token:', token ? `${token.substring(0, 20)}...` : 'empty');
      const res = await fetch('/embed/v1/assistant/chat', { method:'POST', headers:{ 'Content-Type':'application/json', 'easp-api-token': token }, body: JSON.stringify({
        session_id: conversationId || undefined,
        message: text,
        assistant_name: assistantName,
        page_context: pageContext,
        execution_mode: 'normal'
      }) });
      if (!res.ok) { const errTxt = await res.text(); console.error('[EASPAssistant iframe] request failed:', res.status, errTxt); append('assistant', '请求失败：' + errTxt, true); return; }
      await readSSE(res, chunk => { answer += chunk; append('assistant', answer, true); }, id => { conversationId = id; localStorage.setItem('easp_embed_frame_conversation_id', id); console.log('[EASPAssistant iframe] new conversation:', id); }, appendStep);
    }
  window.addEventListener('message', (event) => {
      const data = event.data || {};
      console.log('[EASPAssistant iframe] received message:', data);
      if (data.type === 'EASP_ASSISTANT_TOKEN') { token = data.token || ''; pageContext = data.context || pageContext; if (data.assistantName) assistantName = data.assistantName; document.querySelector('.hd span').textContent = assistantName; state.textContent = token ? '已连接' : '无 Token'; }
      if (data.type === 'EASP_ASSISTANT_CONTEXT_UPDATE') pageContext = data.context || pageContext;
      if (data.type === 'EASP_ASSISTANT_LOGOUT') { token = ''; state.textContent = '已退出'; }
    });
    document.getElementById('send').onclick = send;
    input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
  </script>
</body>
</html>
