<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>EASP 接入文档</title>
<style>
body{
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  max-width: 980px;
  margin: 40px auto;
  padding: 0 24px;
  line-height: 1.7;
  color: #172033;
}
pre{
  background: #0f172a;
  color: #e2e8f0;
  padding: 16px;
  border-radius: 8px;
  overflow: auto;
}
code{
  background: #f1f5f9;
  padding: 2px 5px;
  border-radius: 4px;
}
pre code{
  background: transparent;
  padding: 0;
}
table{
  border-collapse: collapse;
  width: 100%;
  margin: 12px 0;
}
td, th{
  border: 1px solid #d9e2ec;
  padding: 8px;
  text-align: left;
}
blockquote{
  border-left: 4px solid #1677ff;
  background: #f5faff;
  padding: 8px 16px;
  margin: 16px 0;
}
h1{
  font-size: 2em;
  margin-top: 0.67em;
  border-bottom: 1px solid #eaecef;
  padding-bottom: 0.3em;
}
h2{
  font-size: 1.5em;
  margin-top: 1em;
  border-bottom: 1px solid #eaecef;
  padding-bottom: 0.3em;
}
h3{
  font-size: 1.25em;
  margin-top: 1em;
}
</style>
</head>
<body>
$body$
</body>
</html>
