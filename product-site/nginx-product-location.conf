# EASP 产品介绍页临时映射配置片段
# 已应用到 /etc/nginx/conf.d/easp.conf 的 server { listen 8000; } 中
# 访问地址: http://localhost:8000/product/

location = /product {
    return 301 /product/;
}

location /product/ {
    alias /home/workCode/easp/product-site/;
    index index.html;
    try_files $uri $uri/ /product/index.html;
}
